<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Formulir dan Jenis Perizinan</title>

<!-- Bootstrap -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- DataTables -->
<link
href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
rel="stylesheet">

<!-- Bootstrap Icons -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<style>

:root{
    --navy:#1e293b;
    --navy-soft:#334155;
    --bg:#f1f5f9;
    --white:#ffffff;
    --border:#e2e8f0;
    --text:#0f172a;
    --muted:#64748b;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow-x:hidden;
	background:var(--bg);
    font-family:'Segoe UI',sans-serif;
    color:var(--text);
}

/* CARD */

.card-custom{
    border:none;
    border-radius:0;
    overflow:hidden;
    background:var(--white);
    box-shadow:
    0 4px 20px rgba(15,23,42,0.06);
}

/* HEADER */

.header-section{
    background:
    linear-gradient(
        135deg,
        var(--navy),
        var(--navy-soft)
    );

    color:white;
    padding:28px;
}

.header-section h2{
    margin:0;
    font-weight:700;
    letter-spacing:0.3px;
}

.header-section p{
    color:rgba(255,255,255,0.75);
    font-size:14px;
}

/* FILTER BOX */

.filter-box{
    background:#f8fafc;
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:24px;
}

/* TABLE */

.table{
    vertical-align:middle;
    margin-bottom:0;
}

.table thead th{
    background:var(--navy) !important;
    color:white !important;
    border:none;
    font-size:14px;
    font-weight:600;
    padding:14px;
}

.table tbody td{
    padding:14px;
    border-color:var(--border);
}

.table tbody tr{
    transition:0.2s;
}

.table tbody tr:hover{
    background:#f8fafc;
}

/* BADGES */

.badge{
    border-radius:999px;
    padding:8px 14px;
    font-size:12px;
    font-weight:600;
}

.badge-kegiatan{
    background:#e2e8f0;
    color:var(--navy);
}

.badge-success{
    background:#dcfce7;
    color:#166534;
}

.badge-warning{
    background:#fef3c7;
    color:#92400e;
}

.badge-secondary{
    background:#e2e8f0;
    color:#475569;
}

/* BUTTON */

.btn-custom{
    border-radius:12px;
    padding:7px 14px;
    font-size:13px;
    font-weight:600;
    border:none;
    transition:0.2s;
}

.btn-download{
    background:var(--navy);
    color:white;
}

.btn-download:hover{
    background:#0f172a;
    color:white;
}

.btn-preview{
    background:#334155;
    color:white;
}

.btn-preview:hover{
    background:#475569;
    color:white;
}

/* FORM */

.form-select{
    border-radius:12px;
    border:1px solid var(--border);
    padding:10px 14px;
}

.form-label{
    color:var(--navy);
}

/* DATATABLE */

.dataTables_wrapper .dataTables_filter input{
    border-radius:12px;
    border:1px solid var(--border);
    padding:8px 12px;
    margin-left:8px;
}

.dataTables_wrapper .dataTables_length select{
    width:80px !important;
    min-width:80px !important;
    padding:6px 30px 6px 10px !important;
    border-radius:12px;
}

.dataTables_wrapper .dataTables_paginate .paginate_button{
    border-radius:10px !important;
}

.dataTables_wrapper .dataTables_paginate .paginate_button.current{
    background:var(--navy) !important;
    border:none !important;
    color:white !important;
}

/* MOBILE */

@media(max-width:768px){

    .header-section{
        padding:22px;
    }

    .header-section h2{
        font-size:22px;
    }

    .table thead th,
    .table tbody td{
        font-size:13px;
    }

}

</style>

</head>

<body>

<div class="container-fluid p-0">

<div class="card card-custom rounded-0 border-0 min-vh-100">

<div class="header-section">

<h2>
<i class="bi bi-file-earmark-text"></i>
Formulir & Jenis Perizinan
</h2>

<p class="mb-0 mt-2">
DPMPTSP Kabupaten Bantul
</p>

</div>

<div class="p-4">

<!-- FILTER -->
<div class="filter-box">

<div class="row align-items-center">

<div class="col-md-4">

<label class="form-label fw-semibold">
Filter Jenis Kegiatan
</label>

<select id="filterKegiatan"
class="form-select">

<option value="">
--Semua Kegiatan--
</option>

</select>

</div>

</div>

</div>

<!-- TABLE -->
<div class="table-responsive">

<table id="tabelizin"
class="table table-hover align-middle">

<thead>

<tr>
<th width="60">No</th>
<th>Nama Izin</th>
<th>Kegiatan</th>
<th width="120">Unduh</th>
<th width="120">Lihat</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

</div>

<!-- JS -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>

fetch('https://opensheet.elk.sh/1V6yWNMpVjlR4pBVlQMf0Z9yRHGNY_rYuslTc4Wf66uU/Sheet1')

.then(response => response.json())

.then(data => {

    let html = '';

    let kegiatanSet = new Set();

    data.forEach((item, index) => {

        // AMBIL DATA KEGIATAN UNTUK FILTER
        kegiatanSet.add(item.Kegiatan);

        html += `
        <tr>

        <td>
            ${index + 1}
        </td>

        <td class="fw-semibold">
            ${item["Nama Izin"]}
        </td>

        <td>
            ${item["Kegiatan"]}
        </td>

        <td>

            <a class="btn btn-sm btn-custom btn-download"
               target="_blank"
               href="${item.Unduh}">

               <i class="bi bi-download"></i>
               

            </a>

        </td>
		
		<td>

            <a class="btn btn-sm btn-custom btn-preview"
               target="_blank"
               href="${item.Lihat}">

               <i class="bi bi-eye"></i>
               

            </a>

        </td>

        </tr>
        `;
    });

    // MASUKKAN DATA KE TABLE
    document.getElementById('tbody').innerHTML = html;

    // ISI DROPDOWN FILTER
    kegiatanSet.forEach(kegiatan => {

        $('#filterKegiatan').append(`
            <option value="${kegiatan}">
                ${kegiatan}
            </option>
        `);

    });

    // INISIALISASI DATATABLE
    let table = $('#tabelizin').DataTable({

        responsive:true,

        pageLength:10,

        language:{

            search:"Pencarian:",

            lengthMenu:"Tampilkan _MENU_ data",

            info:"Menampilkan _START_ sampai _END_ dari _TOTAL_ data",

            paginate:{
                previous:"←",
                next:"→"
            }

        }

    });

    // FILTER BERDASARKAN KEGIATAN
    $('#filterKegiatan').on('change', function(){

        table.column(2)
             .search(this.value)
             .draw();

    });

});

</script>

<footer class="text-center py-3 small text-muted border-top bg-white">

© <span id="year"></span>
DPMPTSP Kabupaten Bantul

</footer>

<script>

document.getElementById('year').innerHTML =
new Date().getFullYear();

</script>

</body>

</html>
